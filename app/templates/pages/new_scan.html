{% extends "base.html" %}

{% block title %}New Scan - WebShield Scanner{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/scanner.css') }}">
<style>
    .scan-form-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px 0;
    }
    .scan-form {
        background: rgba(255, 255, 255, 0.03);
        border-radius: 16px;
        padding: 25px;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .scan-form .form-label {
        color: #8899aa;
        font-size: 0.85rem;
        font-weight: 600;
    }
    .scan-form .form-control {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 1rem;
    }
    .scan-form .form-control:focus {
        background: rgba(255, 255, 255, 0.08);
        border-color: #00f0ff;
        box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
        color: #fff;
    }
    .scan-form .form-control::placeholder {
        color: #556;
    }
    .scan-options {
        background: rgba(255, 255, 255, 0.02);
        border-radius: 10px;
        padding: 15px;
        margin: 15px 0;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .scan-options .form-check {
        padding: 8px 0;
    }
    .scan-options .form-check-label {
        color: #ccd;
        font-size: 0.85rem;
    }
    .scan-options .form-check-input {
        background-color: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
    }
    .scan-options .form-check-input:checked {
        background-color: #00f0ff;
        border-color: #00f0ff;
    }
    .legal-warning {
        background: rgba(255, 0, 0, 0.05);
        border: 1px solid rgba(255, 0, 0, 0.15);
        border-radius: 10px;
        padding: 15px;
        margin: 15px 0;
    }
    .legal-warning .form-check-label {
        color: #ccd;
        font-size: 0.85rem;
    }
    .legal-warning .form-check-label strong {
        color: #ff6b6b;
    }
    .legal-warning .form-check-input {
        background-color: rgba(255, 0, 0, 0.1);
        border-color: rgba(255, 0, 0, 0.2);
    }
    .legal-warning .form-check-input:checked {
        background-color: #ff4444;
        border-color: #ff4444;
    }
    .btn-scan {
        width: 100%;
        padding: 14px;
        font-size: 1.1rem;
        font-weight: 700;
        border-radius: 12px;
        background: linear-gradient(135deg, #00f0ff, #0066ff);
        border: none;
        color: #fff;
        transition: all 0.3s ease;
    }
    .btn-scan:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 40px rgba(0, 240, 255, 0.3);
    }
    .btn-scan:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }
    .url-preview {
        padding: 10px 15px;
        background: rgba(0, 240, 255, 0.05);
        border-radius: 8px;
        margin-top: 8px;
        font-size: 0.85rem;
        color: #00f0ff;
        display: none;
        word-break: break-all;
    }
    .validation-error {
        color: #ff6b6b;
        font-size: 0.8rem;
        margin-top: 5px;
        display: none;
    }
    .scan-limit-info {
        text-align: center;
        padding: 12px;
        color: #8899aa;
        font-size: 0.8rem;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        margin-top: 15px;
    }
    .scan-limit-info strong {
        color: #00f0ff;
    }
</style>
{% endblock %}

{% block content %}
<div class="scan-form-container">
    <h2 class="page-title text-center mb-3"><i class="fas fa-radar"></i> New Scan</h2>
    
    <form id="scan-form" class="scan-form">
        <!-- URL Input -->
        <div class="mb-3">
            <label for="scan-url" class="form-label"><i class="fas fa-link"></i> Target URL</label>
            <input type="url" class="form-control" id="scan-url" placeholder="https://example.com" required>
            <div id="url-preview" class="url-preview"></div>
            <div id="url-error" class="validation-error"></div>
        </div>
        
        <!-- Scan Options -->
        <div class="scan-options">
            <label class="form-label"><i class="fas fa-sliders-h"></i> Scan Options</label>
            
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="deep-crawl">
                <label class="form-check-label" for="deep-crawl">
                    Deep Crawl (up to 100 pages)
                </label>
            </div>
            
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="check-sensitive">
                <label class="form-check-label" for="check-sensitive">
                    Check for Sensitive Files
                </label>
            </div>
            
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="check-components">
                <label class="form-check-label" for="check-components">
                    Check Outdated Components
                </label>
            </div>
        </div>
        
        <!-- Legal Warning -->
        <div class="legal-warning">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="confirm-auth" required>
                <label class="form-check-label" for="confirm-auth">
                    <i class="fas fa-gavel"></i>
                    I confirm that <strong>I own this website</strong> or have <strong>written permission</strong> to test it.
                </label>
            </div>
        </div>
        
        <!-- Scan Button -->
        <button type="submit" class="btn-scan" id="scan-btn">
            <i class="fas fa-shield-halved"></i> Start Scan
        </button>
        
        <div class="scan-limit-info">
            <i class="fas fa-info-circle"></i>
            Open-source build: scan and report features are included.
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/new-scan.js') }}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        initScanForm();
    });
</script>
{% endblock %}
