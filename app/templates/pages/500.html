{% extends "base.html" %}

{% block title %}Server Error - WebShield Scanner{% endblock %}

{% block content %}
<section class="container py-5 text-center">
    <h1 class="display-5 fw-bold">Something went wrong</h1>
    <p class="lead">The server could not complete the request.</p>
    <a class="btn btn-primary" href="{{ url_for('page.dashboard') if current_user.is_authenticated else url_for('page.splash') }}">Go back</a>
</section>
{% endblock %}
