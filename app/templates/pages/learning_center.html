{% extends "base.html" %}

{% block title %}Learning Center - WebShield Scanner{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/learning.css') }}">
<style>
    .learning-container {
        max-width: 100%;
        padding: 20px 0;
    }
    .learning-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 20px;
    }
    .learning-search {
        display: flex;
        gap: 10px;
    }
    .learning-search input {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        padding: 8px 16px;
        border-radius: 20px;
        width: 200px;
        font-size: 0.85rem;
    }
    .learning-search input:focus {
        outline: none;
        border-color: #00f0ff;
        box-shadow: 0 0 20px rgba(0, 240, 255, 0.05);
    }
    .learning-search input::placeholder {
        color: #556;
    }
    .category-filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 20px;
    }
    .category-filters .cat-btn {
        padding: 6px 16px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: transparent;
        color: #8899aa;
        font-size: 0.75rem;
        transition: all 0.3s ease;
    }
    .category-filters .cat-btn:hover {
        border-color: #00f0ff;
        color: #fff;
    }
    .category-filters .cat-btn.active {
        background: rgba(0, 240, 255, 0.1);
        border-color: #00f0ff;
        color: #00f0ff;
    }
    .lessons-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 15px;
    }
    .lesson-card {
        background: rgba(255, 255, 255, 0.03);
        border-radius: 12px;
        padding: 18px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: all 0.3s ease;
        cursor: pointer;
        text-decoration: none;
        color: #fff;
        display: block;
    }
    .lesson-card:hover {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(0, 240, 255, 0.2);
        transform: translateY(-2px);
        color: #fff;
    }
    .lesson-card.premium {
        border-color: rgba(255, 215, 0, 0.2);
    }
    .lesson-card .lesson-badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 10px;
        font-size: 0.6rem;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 8px;
    }
    .badge-owasp {
        background: rgba(0, 240, 255, 0.15);
        color: #00f0ff;
    }
    .badge-web_security {
        background: rgba(76, 175, 80, 0.15);
        color: #4caf50;
    }
    .badge-secure_coding {
        background: rgba(255, 152, 0, 0.15);
        color: #ff9800;
    }
    .badge-testing {
        background: rgba(244, 67, 54, 0.15);
        color: #f44336;
    }
    .badge-api_security {
        background: rgba(156, 39, 176, 0.15);
        color: #ab47bc;
    }
    .badge-premium {
        background: rgba(255, 215, 0, 0.15);
        color: #ffd700;
        margin-left: 5px;
    }
    .lesson-card .lesson-title {
        font-weight: 600;
        font-size: 1rem;
        margin: 5px 0;
    }
    .lesson-card .lesson-excerpt {
        font-size: 0.8rem;
        color: #8899aa;
        margin: 8px 0;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
    .lesson-card .lesson-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.7rem;
        color: #667;
        margin-top: 10px;
    }
    .lesson-card .lesson-meta .difficulty {
        padding: 2px 10px;
        border-radius: 10px;
        font-size: 0.6rem;
        font-weight: 600;
    }
    .difficulty-beginner {
        background: rgba(76, 175, 80, 0.15);
        color: #4caf50;
    }
    .difficulty-intermediate {
        background: rgba(255, 152, 0, 0.15);
        color: #ff9800;
    }
    .difficulty-advanced {
        background: rgba(244, 67, 54, 0.15);
        color: #f44336;
    }
    .lesson-card .locked {
        color: #ffd700;
        font-size: 0.8rem;
    }
    .no-lessons {
        text-align: center;
        padding: 40px 0;
        color: #8899aa;
        grid-column: 1 / -1;
    }
    .no-lessons i {
        font-size: 3rem;
        color: #334;
        margin-bottom: 10px;
    }
    .premium-upsell {
        text-align: center;
        padding: 20px;
        background: rgba(255, 215, 0, 0.05);
        border-radius: 12px;
        border: 1px solid rgba(255, 215, 0, 0.1);
        margin-top: 20px;
    }
    .premium-upsell p {
        color: #8899aa;
        margin-bottom: 10px;
    }
    .premium-upsell .btn-premium {
        background: linear-gradient(135deg, #ffd700, #f57c00);
        border: none;
        color: #fff;
        padding: 10px 30px;
        border-radius: 25px;
        font-weight: 600;
        transition: all 0.3s ease;
    }
    .premium-upsell .btn-premium:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
    }
</style>
{% endblock %}

{% block content %}
<div class="learning-container">
    <div class="learning-header">
        <h2 class="page-title"><i class="fas fa-graduation-cap"></i> Learning Center</h2>
        <div class="learning-search">
            <input type="text" id="search-lessons" placeholder="Search lessons...">
        </div>
    </div>
    
    <div class="category-filters" id="category-filters">
        <button class="cat-btn active" data-category="all">All</button>
        <button class="cat-btn" data-category="owasp">OWASP Top 10</button>
        <button class="cat-btn" data-category="web_security">Web Security</button>
        <button class="cat-btn" data-category="secure_coding">Secure Coding</button>
        <button class="cat-btn" data-category="testing">Testing</button>
        <button class="cat-btn" data-category="api_security">API Security</button>
    </div>
    
    <div class="lessons-grid" id="lessons-grid">
        <!-- Populated by JavaScript -->
        <div class="no-lessons">
            <i class="fas fa-book-open"></i>
            <p>Loading lessons...</p>
        </div>
    </div>
    
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/learning-center.js') }}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        loadLessons();
    });
</script>
{% endblock %}
