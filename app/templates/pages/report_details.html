{% extends "base.html" %}

{% block title %}Report - WebShield Scanner{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/reports.css') }}">
<style>
    .report-header {
        background: rgba(255, 255, 255, 0.03);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .report-score {
        display: flex;
        align-items: center;
        gap: 20px;
    }
    .report-score .score-circle {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Orbitron', monospace;
        font-size: 1.8rem;
        font-weight: 900;
        border: 4px solid;
        flex-shrink: 0;
    }
    .score-good {
        color: #4caf50;
        border-color: #4caf50;
    }
    .score-medium {
        color: #ff9800;
        border-color: #ff9800;
    }
    .score-bad {
        color: #f44336;
        border-color: #f44336;
    }
    .report-meta {
        flex: 1;
    }
    .report-meta .url {
        font-size: 1.1rem;
        font-weight: 600;
        color: #fff;
        word-break: break-all;
    }
    .report-meta .details {
        font-size: 0.8rem;
        color: #8899aa;
    }
    .report-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 10px;
    }
    .report-actions .btn {
        padding: 8px 16px;
        font-size: 0.8rem;
        border-radius: 8px;
    }
    .finding-filters {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 15px;
    }
    .finding-filters .filter-btn {
        padding: 6px 16px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: transparent;
        color: #8899aa;
        font-size: 0.75rem;
        transition: all 0.3s ease;
    }
    .finding-filters .filter-btn:hover {
        border-color: #00f0ff;
        color: #fff;
    }
    .finding-filters .filter-btn.active {
        background: rgba(0, 240, 255, 0.1);
        border-color: #00f0ff;
        color: #00f0ff;
    }
    .finding-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .finding-item {
        background: rgba(255, 255, 255, 0.03);
        border-radius: 12px;
        padding: 16px;
        border-left: 4px solid #8899aa;
        transition: all 0.3s ease;
    }
    .finding-item:hover {
        background: rgba(255, 255, 255, 0.06);
    }
    .finding-item.critical {
        border-left-color: #f44336;
    }
    .finding-item.high {
        border-left-color: #ff6b6b;
    }
    .finding-item.medium {
        border-left-color: #ff9800;
    }
    .finding-item.low {
        border-left-color: #4caf50;
    }
    .finding-item.info {
        border-left-color: #8899aa;
    }
    .finding-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
    }
    .finding-title {
        color: #fff;
        font-weight: 600;
        font-size: 0.95rem;
    }
    .finding-severity {
        padding: 2px 12px;
        border-radius: 12px;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        white-space: nowrap;
    }
    .severity-critical {
        background: rgba(244, 67, 54, 0.2);
        color: #f44336;
    }
    .severity-high {
        background: rgba(255, 107, 107, 0.2);
        color: #ff6b6b;
    }
    .severity-medium {
        background: rgba(255, 152, 0, 0.2);
        color: #ff9800;
    }
    .severity-low {
        background: rgba(76, 175, 80, 0.2);
        color: #4caf50;
    }
    .severity-info {
        background: rgba(136, 153, 170, 0.2);
        color: #8899aa;
    }
    .finding-body {
        margin-top: 10px;
        font-size: 0.85rem;
        color: #ccd;
    }
    .finding-body .evidence {
        background: rgba(0, 0, 0, 0.3);
        padding: 10px;
        border-radius: 6px;
        font-family: 'Courier New', monospace;
        font-size: 0.75rem;
        color: #8899aa;
        margin: 8px 0;
        overflow-x: auto;
    }
    .finding-body .recommendation {
        background: rgba(0, 240, 255, 0.05);
        padding: 10px;
        border-radius: 6px;
        border-left: 3px solid #00f0ff;
        margin: 8px 0;
        color: #ccd;
    }
    .finding-body .meta-tags {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 8px;
        font-size: 0.7rem;
        color: #667;
    }
    .finding-body .meta-tags span {
        background: rgba(255, 255, 255, 0.05);
        padding: 2px 10px;
        border-radius: 12px;
    }
    .no-findings {
        text-align: center;
        padding: 40px 0;
        color: #8899aa;
    }
    .no-findings i {
        font-size: 3rem;
        color: #334;
        margin-bottom: 10px;
    }
    .report-summary-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 10px;
        margin: 15px 0;
    }
    .summary-stat {
        text-align: center;
        padding: 10px;
        background: rgba(255, 255, 255, 0.02);
        border-radius: 8px;
    }
    .summary-stat .num {
        font-family: 'Orbitron', monospace;
        font-size: 1.2rem;
        font-weight: 700;
        color: #00f0ff;
    }
    .summary-stat .label {
        font-size: 0.7rem;
        color: #8899aa;
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-3">
    <div class="report-header" id="report-header">
        <div class="report-score">
            <div class="score-circle" id="score-circle">--</div>
            <div class="report-meta">
                <div class="url" id="report-url">Loading...</div>
                <div class="details">
                    <span id="report-date">--</span>
                    <span class="mx-2">|</span>
                    <span id="report-duration">--</span>
                    <span class="mx-2">|</span>
                    <span id="report-pages">-- pages</span>
                </div>
                <div class="report-actions">
                    <a class="btn btn-outline-info btn-sm" href="{{ url_for('page.attack_surface_map', scan_id=scan_id) }}" id="attack-surface-link">
                        <i class="fas fa-diagram-project"></i> Attack Surface
                    </a>
                    <button class="btn btn-outline-primary btn-sm" onclick="exportReport('html')">
                        <i class="fas fa-file-code"></i> HTML
                    </button>
                    <button class="btn btn-outline-primary btn-sm" onclick="exportReport('pdf')">
                        <i class="fas fa-file-pdf"></i> PDF
                    </button>
                    <button class="btn btn-outline-primary btn-sm" onclick="exportReport('json')">
                        <i class="fas fa-file-code"></i> JSON
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="report-summary-stats" id="summary-stats">
        <!-- Populated by JS -->
    </div>

    <div class="triage-panel" id="triage-panel">
        <!-- Populated by JS -->
    </div>

    <div class="category-overview" id="category-overview">
        <!-- Populated by JS -->
    </div>
    
    <div class="report-controls">
        <div class="finding-filters" id="finding-filters">
            <button class="filter-btn active" data-severity="all">All</button>
            <button class="filter-btn" data-severity="critical">Critical</button>
            <button class="filter-btn" data-severity="high">High</button>
            <button class="filter-btn" data-severity="medium">Medium</button>
            <button class="filter-btn" data-severity="low">Low</button>
            <button class="filter-btn" data-severity="info">Info</button>
        </div>

        <select class="category-filter" id="category-filter" aria-label="Filter by category">
            <option value="all">All categories</option>
        </select>

        <div class="report-search">
            <i class="fas fa-search"></i>
            <input type="search" id="finding-search" placeholder="Search title, URL, evidence">
        </div>

        <div class="view-toggle" id="view-toggle" role="group" aria-label="Finding view">
            <button class="view-btn active" type="button" data-view="grouped">
                <i class="fas fa-layer-group"></i> Grouped
            </button>
            <button class="view-btn" type="button" data-view="instances">
                <i class="fas fa-list-ul"></i> Instances
            </button>
        </div>
    </div>

    <div class="report-result-meta" id="report-result-meta"></div>
    
    <div class="finding-list" id="finding-list">
        <div class="no-findings">
            <i class="fas fa-search"></i>
            <p>Loading findings...</p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/report-details.js') }}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const scanId = {{ scan_id }};
        loadReport(scanId);
    });
</script>
{% endblock %}
