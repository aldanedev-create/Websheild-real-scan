{% extends "auth_base.html" %}

{% block title %}Forgot Password - WebShield Scanner{% endblock %}

{% block content %}
<div class="auth-form-container">
    <h3 class="auth-form-title">Reset Password</h3>
    <p class="auth-form-subtitle">Enter your email address and we'll send you a reset link</p>
    
    <form id="forgot-form" method="POST" action="{{ url_for('auth.forgot_password') }}">
        {{ form.hidden_tag() if form else '' }}
        
        <div class="form-group mb-3">
            <label for="email" class="form-label">
                <i class="fas fa-envelope"></i> Email Address
            </label>
            <input type="email" class="form-control" id="email" name="email" 
                   placeholder="Enter your registered email" required autofocus>
        </div>
        
        <button type="submit" class="btn btn-primary btn-auth">
            <i class="fas fa-paper-plane"></i> Send Reset Link
        </button>
    </form>
    
    <div class="auth-footer-link">
        <a href="{{ url_for('page.login') }}"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>
</div>

<style>
    .btn-auth {
        width: 100%;
        padding: 12px;
        font-weight: 600;
        border-radius: 10px;
        background: linear-gradient(135deg, #00f0ff, #0066ff);
        border: none;
        transition: all 0.3s ease;
    }
    .btn-auth:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
    }
    .auth-footer-link {
        text-align: center;
        margin-top: 20px;
    }
    .auth-footer-link a {
        color: #8899aa;
        text-decoration: none;
        transition: color 0.3s ease;
        font-size: 0.9rem;
    }
    .auth-footer-link a:hover {
        color: #00f0ff;
    }
    .auth-footer-link a i {
        margin-right: 6px;
    }
</style>
{% endblock %}
