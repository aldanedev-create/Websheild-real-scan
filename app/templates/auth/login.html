{% extends "auth_base.html" %}

{% block title %}Login - WebShield Scanner{% endblock %}

{% block content %}
<div class="auth-form-container">
    <h3 class="auth-form-title">Welcome Back</h3>
    <p class="auth-form-subtitle">Sign in to continue securing your web applications</p>
    
    <form id="login-form" method="POST" action="{{ url_for('auth.login') }}">
        {{ form.hidden_tag() if form else '' }}
        
        <div class="form-group mb-3">
            <label for="email_or_username" class="form-label">
                <i class="fas fa-user"></i> Email or Username
            </label>
            <input type="text" class="form-control" id="email_or_username" name="email_or_username" 
                   placeholder="Enter your email or username" required autofocus>
        </div>
        
        <div class="form-group mb-3">
            <label for="password" class="form-label">
                <i class="fas fa-lock"></i> Password
            </label>
            <div class="password-input-wrapper">
                <input type="password" class="form-control" id="password" name="password" 
                       placeholder="Enter your password" required>
                <button type="button" class="password-toggle" onclick="togglePassword('password')">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>
        
        <div class="form-group mb-3 d-flex justify-content-between align-items-center">
            <div class="form-check">
                <input type="checkbox" class="form-check-input" id="remember" name="remember">
                <label class="form-check-label" for="remember">Remember me</label>
            </div>
            <a href="{{ url_for('page.forgot_password') }}" class="forgot-link">Forgot password?</a>
        </div>
        
        <button type="submit" class="btn btn-primary btn-auth">
            <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
    </form>
    
    <div class="auth-divider">
        <span>or</span>
    </div>
    
    <div class="auth-social">
        <button class="btn btn-social btn-google">
            <i class="fab fa-google"></i> Sign in with Google
        </button>
        <button class="btn btn-social btn-github">
            <i class="fab fa-github"></i> Sign in with GitHub
        </button>
    </div>
    
    <div class="auth-footer-link">
        Don't have an account? <a href="{{ url_for('page.register') }}">Sign Up</a>
    </div>
</div>

<style>
    .password-input-wrapper {
        position: relative;
    }
    .password-input-wrapper .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #667;
        cursor: pointer;
        padding: 5px;
    }
    .password-input-wrapper .password-toggle:hover {
        color: #00f0ff;
    }
    .forgot-link {
        color: #8899aa;
        font-size: 0.85rem;
        text-decoration: none;
        transition: color 0.3s ease;
    }
    .forgot-link:hover {
        color: #00f0ff;
    }
    .btn-auth {
        width: 100%;
        padding: 12px;
        font-weight: 600;
        border-radius: 10px;
        background: linear-gradient(135deg, #00f0ff, #0066ff);
        border: none;
        transition: all 0.3s ease;
    }
    .btn-auth:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
    }
    .auth-divider {
        text-align: center;
        margin: 20px 0;
        position: relative;
    }
    .auth-divider::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: rgba(255, 255, 255, 0.05);
    }
    .auth-divider span {
        background: #0a0a1a;
        padding: 0 15px;
        color: #667;
        font-size: 0.85rem;
        position: relative;
        z-index: 1;
    }
    .auth-social {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .btn-social {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        background: rgba(255, 255, 255, 0.02);
        color: #ccd;
        font-weight: 500;
        transition: all 0.3s ease;
    }
    .btn-social:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(0, 240, 255, 0.2);
        color: #fff;
    }
    .btn-social i {
        margin-right: 10px;
    }
    .btn-google i {
        color: #ea4335;
    }
    .btn-github i {
        color: #fff;
    }
    .auth-footer-link {
        text-align: center;
        margin-top: 20px;
        color: #8899aa;
        font-size: 0.9rem;
    }
    .auth-footer-link a {
        color: #00f0ff;
        text-decoration: none;
        font-weight: 600;
    }
    .auth-footer-link a:hover {
        text-decoration: underline;
    }
</style>

<script>
    function togglePassword(id) {
        const input = document.getElementById(id);
        const icon = input.parentElement.querySelector('.password-toggle i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>
{% endblock %}
